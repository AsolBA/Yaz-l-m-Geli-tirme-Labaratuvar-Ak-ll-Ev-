services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    environment:
      INTERNAL_SERVICE_TOKEN: dev-gateway-internal-secret
      MONGODB_URI: mongodb://mongodb:27017/authdb
    depends_on:
      - mongodb
      - redis
    command: npm run dev
    working_dir: /app/apps/auth-service

  devicecontrol-service:
    build:
      context: .
      dockerfile: apps/devicecontrol-service/Dockerfile
    environment:
      INTERNAL_SERVICE_TOKEN: dev-gateway-internal-secret
    depends_on:
      - mongodb
    command: npm run dev
    working_dir: /app/apps/devicecontrol-service

  telemetry-service:
    build:
      context: .
      dockerfile: apps/telemetry-service/Dockerfile
    environment:
      INTERNAL_SERVICE_TOKEN: dev-gateway-internal-secret
    depends_on:
      - mongodb
    command: npm run dev
    working_dir: /app/apps/telemetry-service

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      INTERNAL_SERVICE_TOKEN: dev-gateway-internal-secret
    depends_on:
      - auth-service
      - devicecontrol-service
      - telemetry-service
    command: npm run dev
    working_dir: /app/apps/gateway

  influxdb:
    image: influxdb:1.8
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: k6

  grafana:
    image: grafana/grafana:10.4.3
    ports:
      - "3005:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - influxdb