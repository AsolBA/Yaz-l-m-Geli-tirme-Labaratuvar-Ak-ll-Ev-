networks:
  smart_home_net:
    name: smart_home_net
    driver: bridge

services:
  redis:
    image: redis:7
    networks:
      - smart_home_net

  mongodb:
    image: mongo:7
    networks:
      - smart_home_net

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    environment:
      INTERNAL_SERVICE_TOKEN: dev-gateway-internal-secret
      MONGODB_URI: mongodb://mongodb:27017/authdb
    depends_on:
      - mongodb
      - redis
    command: npm run dev
    working_dir: /app/apps/auth-service
    networks:
      - smart_home_net

  devicecontrol-service:
    build:
      context: .
      dockerfile: apps/devicecontrol-service/Dockerfile
    environment:
      INTERNAL_SERVICE_TOKEN: dev-gateway-internal-secret
    depends_on:
      - mongodb
    command: npm run dev
    working_dir: /app/apps/devicecontrol-service
    networks:
      - smart_home_net

  telemetry-service:
    build:
      context: .
      dockerfile: apps/telemetry-service/Dockerfile
    environment:
      INTERNAL_SERVICE_TOKEN: dev-gateway-internal-secret
    depends_on:
      - mongodb
    command: npm run dev
    working_dir: /app/apps/telemetry-service
    networks:
      - smart_home_net

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      INTERNAL_SERVICE_TOKEN: dev-gateway-internal-secret
      ACCESS_LOG_DIR: /logs
    volumes:
      - ./infra/logs:/logs
    depends_on:
      - auth-service
      - devicecontrol-service
      - telemetry-service
    command: npm run dev
    working_dir: /app/apps/gateway
    networks:
      - smart_home_net

  prometheus:
    image: prom/prometheus:v2.52.0
    # Host 9099: Windows'ta 9090 başka uygulama (başka Prometheus vb.) kullanıyorsa çakışmayı önler
    ports:
      - "9099:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    depends_on:
      - gateway
    restart: unless-stopped
    networks:
      - smart_home_net

  loki:
    image: grafana/loki:2.9.8
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - smart_home_net

  promtail:
    image: grafana/promtail:2.9.8
    user: root
    volumes:
      - ./infra/promtail/promtail-config.yaml:/etc/promtail/config.yml:ro
      - ./infra/logs:/logs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
      - gateway
    networks:
      - smart_home_net

  influxdb:
    image: influxdb:1.8
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: k6
    restart: unless-stopped
    networks:
      - smart_home_net

  grafana:
    image: grafana/grafana:10.4.3
    ports:
      - "3005:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - influxdb
      - prometheus
      - loki
      - promtail
    restart: unless-stopped
    networks:
      - smart_home_net

volumes:
  loki_data:
  prometheus_data:
