server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker Desktop / Linux: konteyner stdout (json); compose_service etiketi
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: compose_service
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container_name
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
    pipeline_stages:
      - docker: {}

  # Her ortamda çalışır: gateway ./infra/logs/gateway-access.log
  - job_name: gateway-access
    static_configs:
      - targets:
          - localhost
        labels:
          job: gateway-access
          compose_service: gateway
          __path__: /logs/gateway-access.log
